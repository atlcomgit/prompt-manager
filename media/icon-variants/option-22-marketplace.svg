<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="22" y1="18" x2="228" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2A40"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#080C13"/>
    </linearGradient>
    <!-- Side slab accent -->
    <linearGradient id="slab" x1="148" y1="34" x2="222" y2="222" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#77EFFF"/>
      <stop offset="1" stop-color="#309FFF"/>
    </linearGradient>
    <!-- Monolith gate mask -->
    <mask id="mark22" maskUnits="userSpaceOnUse" x="34" y="34" width="188" height="188">
      <rect x="34" y="34" width="188" height="188" rx="48" fill="white"/>
      <rect x="104" y="68" width="42" height="120" rx="21" fill="black"/>
    </mask>
  </defs>

  <!-- Background tile -->
  <rect x="16" y="16" width="224" height="224" rx="40" fill="url(#bg)"/>
  <rect x="16.75" y="16.75" width="222.5" height="222.5" rx="39.25" stroke="#31465F" stroke-width="1.5"/>

  <!-- Monolith gate mark -->
  <g mask="url(#mark22)">
    <rect x="34" y="34" width="188" height="188" rx="48" fill="#F6F8FC"/>
    <rect x="148" y="34" width="74" height="188" rx="37" fill="url(#slab)"/>
  </g>
</svg>