<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="22" y1="18" x2="228" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2A40"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#080C13"/>
    </linearGradient>
    <!-- Underline accent gradient -->
    <linearGradient id="accent" x1="52" y1="180" x2="204" y2="198" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#77EFFF"/>
      <stop offset="1" stop-color="#309FFF"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect x="16" y="16" width="224" height="224" rx="40" fill="url(#bg)"/>
  <rect x="16.75" y="16.75" width="222.5" height="222.5" rx="39.25" stroke="#31465F" stroke-width="1.5"/>

  <!-- Centered lowercase pm wordmark -->
  <text x="128" y="167" text-anchor="middle" fill="#F6F8FC" stroke="url(#bg)" stroke-width="10" stroke-linejoin="round" paint-order="stroke fill" font-family="'DejaVu Sans', 'Liberation Sans', sans-serif" font-size="154" font-weight="800" letter-spacing="-6">pm</text>
  <rect x="52" y="180" width="152" height="18" rx="9" fill="url(#accent)"/>
</svg>