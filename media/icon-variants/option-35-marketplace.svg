<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="22" y1="18" x2="228" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B2A40"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#080C13"/>
    </linearGradient>
    <!-- Badge gradient -->
    <linearGradient id="accent" x1="148" y1="118" x2="214" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#77EFFF"/>
      <stop offset="1" stop-color="#309FFF"/>
    </linearGradient>
  </defs>

  <!-- Background tile -->
  <rect x="16" y="16" width="224" height="224" rx="40" fill="url(#bg)"/>
  <rect x="16.75" y="16.75" width="222.5" height="222.5" rx="39.25" stroke="#31465F" stroke-width="1.5"/>

  <!-- Drop-cap p with tagged m -->
  <text x="62" y="172" fill="#F6F8FC" font-family="'DejaVu Sans', 'Liberation Sans', sans-serif" font-size="176" font-weight="800" letter-spacing="-10">p</text>
  <rect x="150" y="118" width="66" height="66" rx="18" fill="url(#accent)"/>
  <text x="160" y="164" fill="#0E1625" font-family="'DejaVu Sans', 'Liberation Sans', sans-serif" font-size="72" font-weight="900" letter-spacing="-6">m</text>
</svg>